<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#5d9f55">
  <title>Coin Cat vs. The Evil Mouse — Arena Mode</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #20372f; }
    body { display: grid; place-items: center; overscroll-behavior: none; font-family: ui-rounded, "Trebuchet MS", system-ui, sans-serif; }
    canvas {
      display: block;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      background: #6cad60;
      box-shadow: 0 0 48px #10231fcc;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #leaderboard-panel {
      position: fixed; z-index: 10; left: 50%; top: 50%;
      width: min(440px, calc(100vw - 28px)); max-height: calc(100vh - 24px);
      transform: translate(-50%, -50%) scale(.94); overflow: auto;
      padding: 22px 26px; border: 5px solid #65462f; border-radius: 30px;
      background: #fff0c9; color: #573d2d; text-align: center;
      box-shadow: 0 18px 50px #10231fcc, inset 0 0 0 3px #f6c65c;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    #leaderboard-panel.show { opacity: 1; visibility: visible; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    #leaderboard-panel h2 { margin: 0 0 3px; font-size: clamp(28px, 6vw, 42px); line-height: 1; }
    #leaderboard-panel .final-score { margin: 8px 0 14px; color: #9a622c; font-size: 23px; font-weight: 900; }
    #leaderboard-form { display: flex; gap: 9px; margin-bottom: 13px; }
    #player-name {
      min-width: 0; flex: 1; padding: 12px 14px; border: 3px solid #79543a; border-radius: 15px;
      background: #fffaf0; color: #4d3528; font: 900 20px ui-rounded, "Trebuchet MS", sans-serif;
      text-transform: uppercase; outline: none;
    }
    #player-name:focus { border-color: #d8912f; box-shadow: 0 0 0 4px #f5c95b55; }
    .score-button {
      min-height: 50px; padding: 10px 17px; border: 3px solid #704a2f; border-radius: 15px;
      background: #f6bd43; color: #4d3528; font: 900 16px ui-rounded, "Trebuchet MS", sans-serif;
      cursor: pointer; touch-action: manipulation;
    }
    .score-button:active { transform: translateY(2px); }
    #score-list { margin: 0 0 14px; padding: 0; list-style: none; counter-reset: rank; }
    #score-list li { display: grid; grid-template-columns: 34px 1fr auto; gap: 8px; padding: 6px 10px; border-radius: 10px; font-size: 18px; font-weight: 800; text-align: left; }
    #score-list li:nth-child(odd) { background: #f2d99d; }
    #score-list li::before { counter-increment: rank; content: counter(rank) "."; color: #9a622c; }
    #score-list .score-value { color: #9a622c; }
    #play-again { width: 100%; display: none; }
    #play-again.show { display: block; }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540" aria-label="Coin Cat game canvas"></canvas>
  <section id="leaderboard-panel" aria-hidden="true" aria-labelledby="leaderboard-title">
    <h2 id="leaderboard-title">🏆 HIGH SCORES</h2>
    <div class="final-score">YOUR SCORE: <span id="final-score">0</span></div>
    <form id="leaderboard-form" autocomplete="off">
      <input id="player-name" name="playerName" maxlength="10" inputmode="text" placeholder="YOUR NAME" aria-label="Player name" required>
      <button class="score-button" type="submit">SAVE</button>
    </form>
    <ol id="score-list" aria-label="High score leaderboard"></ol>
    <button id="play-again" class="score-button" type="button">PLAY AGAIN ▶</button>
  </section>
  <script>
  'use strict';

  // All moment-to-moment tuning lives here for quick, friendly tweaking.
  const CONFIG = Object.freeze({
    width: 960, height: 540,
    arena: { left: 26, top: 48, right: 934, bottom: 514, radius: 28 },
    catRadius: 23, catSpeed: 180,
    dashMultiplier: 2.2, dashDuration: 0.18, dashCooldown: 1.2,
    coinRadius: 14, startCoins: 10, coinsPerLevel: 2, maxCoins: 24,
    mouseAnchor: { x: 858, y: 448 },
    mousePatrolTop: 302, mousePatrolBottom: 448, mousePatrolSpeed: 54,
    lassoLoopRadius: 24, lassoStartSpeed: 220, lassoLevelScale: 1.08,
    lassoMaxScale: 2, lassoTimeout: 3,
    windupStart: 0.8, windupMinimum: 0.5, windupStep: 0.055,
    firstCastDelay: 1.6, castGap: 1.15,
    reelSpeed: 120, escapeInputs: 8, invulnerability: 1.5,
    stolenCoins: 3, levelCompleteDelay: 2, finalLevel: 6,
    coinScore: 100, escapeScore: 250, levelScore: 500, caughtPenalty: 300,
    joystickRadius: 58, joystickKnobRadius: 24,
    obstacles: [
      { x: 360, y: 112, w: 112, h: 76, kind: 'crate' },
      { x: 530, y: 158, w: 138, h: 62, kind: 'hedge' },
      { x: 448, y: 280, w: 116, h: 68, kind: 'sofa' }
    ]
  });

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  const leaderboardPanel = document.getElementById('leaderboard-panel');
  const leaderboardForm = document.getElementById('leaderboard-form');
  const playerNameInput = document.getElementById('player-name');
  const finalScoreText = document.getElementById('final-score');
  const scoreList = document.getElementById('score-list');
  const playAgainButton = document.getElementById('play-again');
  const artAtlas = new Image();
  artAtlas.decoding = 'async';
  artAtlas.src = 'assets/coin-cat-sprites-v2.png';
  const atlasReady = () => artAtlas.complete && artAtlas.naturalWidth >= 1024;
  function drawAtlasCell(column, row, x, y, w, h) {
    ctx.drawImage(artAtlas, column * 512, row * 512, 512, 512, x, y, w, h);
  }
  const TAU = Math.PI * 2;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const rand = (a, b) => a + Math.random() * (b - a);
  const DPAD = Object.freeze({
    up: { x: 110, y: 350, w: 50, h: 50, dx: 0, dy: -1, glyph: '▲' },
    left: { x: 55, y: 405, w: 50, h: 50, dx: -1, dy: 0, glyph: '◀' },
    right: { x: 165, y: 405, w: 50, h: 50, dx: 1, dy: 0, glyph: '▶' },
    down: { x: 110, y: 460, w: 50, h: 50, dx: 0, dy: 1, glyph: '▼' }
  });

  let state = 'TITLE';
  let paused = false;
  let level = 1;
  let score = 0;
  let scoreSaved = false;
  let memoryScores = [];
  let time = 0;
  let lastTime = performance.now();
  let screenShake = 0;
  let levelTimer = 0;
  let exitOpen = false;
  let muted = false;
  let nextCast = CONFIG.firstCastDelay;
  let collectedOrder = [];
  let particles = [];
  let floaters = [];
  let confetti = [];
  let keys = Object.create(null);

  const cat = {
    x: 100, y: 270, vx: 0, vy: 0, facing: 1,
    dash: 0, cooldown: 0, invulnerable: 0,
    squash: 0, tail: 0, spin: 0, escape: 0,
    tossVx: 0, tossVy: 0
  };
  const mouse = { x: CONFIG.mouseAnchor.x, y: CONFIG.mouseAnchor.y, direction: -1 };
  let coins = [];
  let lassos = [];

  const pointer = {
    id: null, active: false, side: '', startX: 0, startY: 0,
    x: 0, y: 0, joyX: 0, joyY: 0, lastAngle: null, dir: ''
  };

  // ---------- soft synthesized toy audio ----------
  let audio = null;
  let master = null;
  function initAudio() {
    if (!audio) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audio = new AC();
      master = audio.createGain();
      master.gain.value = muted ? 0 : 0.12;
      master.connect(audio.destination);
    }
    if (audio.state === 'suspended') audio.resume();
  }
  function tone(freq, duration, type = 'sine', volume = 0.35, delay = 0, endFreq = freq) {
    if (!audio || muted) return;
    const t = audio.currentTime + delay;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(20, freq), t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), t + duration);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(volume, t + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain); gain.connect(master);
    osc.start(t); osc.stop(t + duration + 0.03);
  }
  const sound = {
    coin(combo) { tone(620 + combo * 22, .08, 'sine', .28); tone(880 + combo * 28, .11, 'triangle', .24, .065); },
    twang() { tone(150, .22, 'triangle', .32, 0, 92); },
    whoosh() { tone(390, .18, 'sine', .18, 0, 125); },
    boing() { tone(170, .24, 'square', .22, 0, 360); },
    tick() { tone(780, .035, 'square', .12); },
    pop() { tone(260, .1, 'triangle', .32, 0, 840); },
    laugh() { [420, 330, 250].forEach((f, i) => tone(f, .13, 'square', .18, i * .12, f * .82)); },
    door() { tone(520, .1, 'sine', .25); tone(760, .16, 'triangle', .25, .08); },
    victory() { [523, 659, 784, 1047].forEach((f, i) => tone(f, .2, 'triangle', .28, i * .11)); },
    dash() { tone(520, .12, 'sine', .16, 0, 180); }
  };

  function roundRect(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath(); c.roundRect(x, y, w, h, r);
  }
  function circle(c, x, y, r) { c.beginPath(); c.arc(x, y, r, 0, TAU); }
  function outline(fill, stroke = '#59462f', width = 3) {
    ctx.fillStyle = fill; ctx.fill(); ctx.lineWidth = width; ctx.strokeStyle = stroke; ctx.stroke();
  }
  function pointFromEvent(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) * CONFIG.width / r.width, y: (e.clientY - r.top) * CONFIG.height / r.height };
  }

  // ---------- persistent local leaderboard ----------
  const SCORE_STORAGE_KEY = 'coin-cat-arena-high-scores-v1';
  function loadHighScores() {
    try {
      const saved = JSON.parse(localStorage.getItem(SCORE_STORAGE_KEY) || '[]');
      if (Array.isArray(saved)) return saved.filter(v => v && typeof v.name === 'string' && Number.isFinite(v.score));
    } catch (_) { /* Some file:// browsers disable storage; session fallback below. */ }
    return memoryScores.slice();
  }
  function writeHighScores(entries) {
    memoryScores = entries.slice();
    try { localStorage.setItem(SCORE_STORAGE_KEY, JSON.stringify(entries)); } catch (_) { /* Session scores still work. */ }
  }
  function renderHighScores() {
    const entries = loadHighScores().sort((a, b) => b.score - a.score).slice(0, 8);
    scoreList.replaceChildren();
    if (!entries.length) {
      const item = document.createElement('li');
      const name = document.createElement('span'); name.textContent = 'BE THE FIRST!';
      const value = document.createElement('span'); value.className = 'score-value'; value.textContent = '—';
      item.append(name, value); scoreList.append(item); return;
    }
    for (const entry of entries) {
      const item = document.createElement('li');
      const name = document.createElement('span'); name.textContent = entry.name;
      const value = document.createElement('span'); value.className = 'score-value'; value.textContent = entry.score.toLocaleString();
      item.append(name, value); scoreList.append(item);
    }
  }
  function hideLeaderboard() {
    leaderboardPanel.classList.remove('show'); leaderboardPanel.setAttribute('aria-hidden', 'true');
  }
  function showLeaderboard() {
    state = 'LEADERBOARD'; paused = false; lassos = [];
    scoreSaved = false; finalScoreText.textContent = score.toLocaleString();
    playerNameInput.value = ''; playerNameInput.disabled = false;
    leaderboardForm.querySelector('button').disabled = false;
    leaderboardForm.style.display = 'flex'; playAgainButton.classList.remove('show');
    renderHighScores();
    leaderboardPanel.classList.add('show'); leaderboardPanel.setAttribute('aria-hidden', 'false');
  }
  function saveCurrentScore() {
    if (scoreSaved) return;
    const name = playerNameInput.value.trim().replace(/[^a-z0-9 _-]/gi, '').slice(0, 10).toUpperCase() || 'COIN CAT';
    const entries = loadHighScores();
    entries.push({ name, score, date: Date.now() });
    entries.sort((a, b) => b.score - a.score); writeHighScores(entries.slice(0, 8));
    scoreSaved = true; playerNameInput.value = name; playerNameInput.disabled = true;
    leaderboardForm.querySelector('button').disabled = true;
    renderHighScores(); playAgainButton.classList.add('show');
  }

  // ---------- level setup ----------
  function makeCoins() {
    const count = Math.min(CONFIG.maxCoins, CONFIG.startCoins + (level - 1) * CONFIG.coinsPerLevel);
    const seed = rand(-18, 18);
    const made = [];
    for (let i = 0; i < count; i++) {
      const t = i / Math.max(1, count - 1);
      let x = lerp(170, 760, t) + Math.sin(t * Math.PI * 3 + seed) * 14;
      let y = 132 + 265 * t + Math.sin(t * Math.PI * 1.35) * 82 + seed * (t - .5);
      for (const o of CONFIG.obstacles) {
        if (x > o.x - 25 && x < o.x + o.w + 25 && y > o.y - 25 && y < o.y + o.h + 25) y = o.y + o.h + 35;
      }
      made.push({ id: i, x, y: clamp(y, 86, 458), active: true, bob: rand(0, TAU), spin: rand(0, TAU) });
    }
    coins = made;
    collectedOrder = [];
  }
  function startLevel(nextLevel = level) {
    level = nextLevel;
    state = 'PLAYING'; paused = false; exitOpen = false; levelTimer = 0;
    cat.x = 100; cat.y = 270; cat.vx = cat.vy = 0; cat.tossVx = cat.tossVy = 0;
    mouse.x = CONFIG.mouseAnchor.x; mouse.y = CONFIG.mouseAnchor.y; mouse.direction = -1;
    cat.dash = cat.cooldown = cat.invulnerable = cat.squash = cat.spin = cat.escape = 0;
    lassos = []; particles = []; floaters = []; confetti = [];
    nextCast = CONFIG.firstCastDelay;
    makeCoins();
  }
  function startGame() {
    score = 0; scoreSaved = false; hideLeaderboard();
    level = 1; startLevel(1);
  }

  function remainingCoins() { return coins.reduce((n, c) => n + (c.active ? 1 : 0), 0); }

  // ---------- collisions ----------
  function circleRect(cx, cy, radius, r) {
    const px = clamp(cx, r.x, r.x + r.w), py = clamp(cy, r.y, r.y + r.h);
    const dx = cx - px, dy = cy - py;
    return dx * dx + dy * dy < radius * radius;
  }
  function resolveCatObstacle(o) {
    if (!circleRect(cat.x, cat.y, CONFIG.catRadius, o)) return;
    const left = Math.abs(cat.x - (o.x - CONFIG.catRadius));
    const right = Math.abs(cat.x - (o.x + o.w + CONFIG.catRadius));
    const top = Math.abs(cat.y - (o.y - CONFIG.catRadius));
    const bottom = Math.abs(cat.y - (o.y + o.h + CONFIG.catRadius));
    const m = Math.min(left, right, top, bottom);
    if (m === left) cat.x = o.x - CONFIG.catRadius;
    else if (m === right) cat.x = o.x + o.w + CONFIG.catRadius;
    else if (m === top) cat.y = o.y - CONFIG.catRadius;
    else cat.y = o.y + o.h + CONFIG.catRadius;
    cat.squash = .12;
  }
  function segmentIntersectsRect(a, b, r) {
    // Slab test for segment versus expanded obstacle box.
    let t0 = 0, t1 = 1;
    const dx = b.x - a.x, dy = b.y - a.y;
    const sides = [
      [-dx, a.x - r.x], [dx, r.x + r.w - a.x],
      [-dy, a.y - r.y], [dy, r.y + r.h - a.y]
    ];
    for (const [p, q] of sides) {
      if (p === 0) { if (q < 0) return false; }
      else {
        const z = q / p;
        if (p < 0) { if (z > t1) return false; if (z > t0) t0 = z; }
        else { if (z < t0) return false; if (z < t1) t1 = z; }
      }
    }
    return true;
  }

  // ---------- lasso system ----------
  function aimedAngle() { return Math.atan2(cat.y - mouse.y, cat.x - mouse.x); }
  function spawnLasso(slot = 0) {
    // Every cast snapshots the cat's position. The player can still dodge during
    // the telegraph, while the small alternating sweep keeps angles varied.
    const angle = aimedAngle();
    const sweepDirection = (Math.floor(time * 2) + slot) % 2 ? -1 : 1;
    const angular = sweepDirection * Math.min(.24, .075 + level * .015);
    const wind = Math.max(CONFIG.windupMinimum, CONFIG.windupStart - (level - 1) * CONFIG.windupStep);
    lassos.push({
      slot, phase: 'windup', timer: 0, wind, angle, angular,
      targetX: cat.x, targetY: cat.y, aimOffset: rand(-.025, .025),
      radius: 34, maxRadius: 980, speedScale: slot ? .72 : 1,
      x: mouse.x, y: mouse.y,
      alpha: 1, blocked: false, snared: false, twanged: false
    });
    sound.twang();
  }
  function fizzle(l, x = l.x, y = l.y) {
    l.phase = 'retract'; l.blocked = true; l.timer = 0;
    puff(x, y, '#fff1bc', 9); sound.boing();
    floaters.push({ x, y: y - 10, text: 'BOING!', color: '#8b5733', life: .75, size: 22 });
  }
  function snag(l) {
    if (cat.invulnerable > 0 || state !== 'PLAYING') return;
    state = 'SNARED'; l.snared = true; l.phase = 'snared';
    cat.escape = 0; cat.spin = 0; screenShake = .18;
    sound.boing();
    floaters.push({ x: cat.x, y: cat.y - 42, text: '!', color: '#e2473f', life: .8, size: 38 });
  }
  function mashEscape() {
    if (state !== 'SNARED' || paused) return;
    cat.escape = Math.min(CONFIG.escapeInputs, cat.escape + 1);
    sound.tick(); cat.squash = .1;
    puff(cat.x + rand(-12, 12), cat.y + rand(-12, 12), '#fff7d4', 2);
    if (cat.escape >= CONFIG.escapeInputs) escapeSnare();
  }
  function escapeSnare() {
    const l = lassos.find(v => v.snared);
    if (l) { l.snared = false; l.phase = 'retract'; l.timer = 0; }
    state = 'PLAYING'; score += CONFIG.escapeScore;
    cat.invulnerable = CONFIG.invulnerability; cat.squash = .28;
    cat.vx = -140; cat.vy = -90; sound.pop();
    puff(cat.x, cat.y, '#fff7d4', 18);
    floaters.push({ x: cat.x, y: cat.y - 45, text: 'POP!', color: '#4d9a57', life: .9, size: 28 });
    nextCast = Math.max(nextCast, .8);
  }
  function loseCoins() {
    const l = lassos.find(v => v.snared);
    if (l) { l.snared = false; l.phase = 'retract'; l.timer = 0; }
    const restore = collectedOrder.splice(Math.max(0, collectedOrder.length - CONFIG.stolenCoins));
    restore.forEach((id, i) => {
      const coin = coins.find(c => c.id === id);
      if (coin) {
        coin.active = true;
        particles.push({ x: mouse.x, y: mouse.y, vx: (coin.x - mouse.x) * .8, vy: (coin.y - mouse.y) * .8 - 100, life: .8, max: .8, color: '#ffd548', size: 10, coinFly: true });
      }
    });
    score = Math.max(0, score - CONFIG.caughtPenalty);
    exitOpen = false; state = 'PLAYING'; sound.laugh();
    floaters.push({ x: 830, y: 365, text: 'HA HA!', color: '#60334a', life: 1.1, size: 27 });
    cat.x = 620; cat.y = 345; cat.vx = -240; cat.vy = -145;
    cat.invulnerable = CONFIG.invulnerability; cat.squash = .3;
    nextCast = 1.5;
  }
  function updateLassos(dt) {
    if (state === 'PLAYING') {
      nextCast -= dt;
      const maxActive = level >= 6 ? 2 : 1;
      if (nextCast <= 0 && lassos.length < maxActive) {
        spawnLasso(lassos.some(l => l.slot === 0) ? 1 : 0);
        nextCast = level >= 6 && lassos.length === 1 ? .75 : CONFIG.castGap + rand(.2, .65);
      }
    }
    for (const l of lassos) {
      l.timer += dt;
      if (l.phase === 'windup') {
        // Keep the dashed preview joined to the patrolling mouse, but retain the
        // cat position captured at the beginning of the wind-up.
        l.angle = Math.atan2(l.targetY - mouse.y, l.targetX - mouse.x) + l.aimOffset;
        if (l.timer >= l.wind) {
          l.phase = 'cast'; l.timer = 0; l.radius = 34; sound.whoosh();
          l.x = mouse.x + Math.cos(l.angle) * l.radius;
          l.y = mouse.y + Math.sin(l.angle) * l.radius;
        }
      } else if (l.phase === 'cast') {
        const speed = CONFIG.lassoStartSpeed * Math.min(CONFIG.lassoMaxScale, Math.pow(CONFIG.lassoLevelScale, level - 1)) * l.speedScale;
        l.radius += speed * dt;
        l.angle += l.angular * dt;
        l.x = mouse.x + Math.cos(l.angle) * l.radius;
        l.y = mouse.y + Math.sin(l.angle) * l.radius;
        const endpoint = { x: l.x, y: l.y };
        const blocker = CONFIG.obstacles.find(o => segmentIntersectsRect(mouse, endpoint, o));
        if (blocker) {
          const steps = 28;
          for (let i = 1; i <= steps; i++) {
            const p = { x: lerp(mouse.x, l.x, i / steps), y: lerp(mouse.y, l.y, i / steps) };
            if (circleRect(p.x, p.y, 3, blocker)) { fizzle(l, p.x, p.y); break; }
          }
        }
        if (l.phase === 'cast' && Math.hypot(l.x - cat.x, l.y - cat.y) < CONFIG.lassoLoopRadius + CONFIG.catRadius * .72) snag(l);
        const a = CONFIG.arena;
        if (l.phase === 'cast' && (l.timer > CONFIG.lassoTimeout || l.x < a.left || l.x > a.right || l.y < a.top || l.y > a.bottom)) {
          l.phase = 'retract'; l.timer = 0;
        }
      } else if (l.phase === 'retract') {
        l.radius = Math.max(0, l.radius - 650 * dt);
        l.x = mouse.x + Math.cos(l.angle) * l.radius;
        l.y = mouse.y + Math.sin(l.angle) * l.radius;
        l.alpha = clamp(l.radius / 60, 0, 1);
      } else if (l.phase === 'snared') {
        l.x = cat.x; l.y = cat.y; l.radius = dist(mouse, cat);
      }
    }
    lassos = lassos.filter(l => !(l.phase === 'retract' && l.radius <= 4));
  }

  // ---------- movement and game update ----------
  function triggerDash() {
    if (state === 'SNARED') { mashEscape(); return; }
    if (state !== 'PLAYING' || paused || cat.cooldown > 0) return;
    cat.dash = CONFIG.dashDuration; cat.cooldown = CONFIG.dashCooldown; cat.squash = -.18;

      ctx.font = '900 88px sans-serif'; ctx.fillText('★', 0, 88); ctx.restore();
    }
    if (state === 'LEADERBOARD') {
      ctx.save(); ctx.fillStyle = '#1d2b27bb'; ctx.fillRect(0, 0, 960, 540); ctx.restore();
    }
    if (paused) {
      ctx.save(); ctx.fillStyle = '#1d2b27aa'; ctx.fillRect(0, 0, 960, 540);
      roundRect(ctx, 320, 183, 320, 174, 30); outline('#fff0c9', '#654a35', 5);
      ctx.fillStyle = '#59402f'; ctx.textAlign = 'center'; ctx.font = '900 44px ui-rounded, sans-serif'; ctx.fillText('PAUSED', 480, 246);
      ctx.font = '700 21px ui-rounded, sans-serif'; ctx.fillText('Tap here or press P', 480, 294);
      ctx.fillStyle = '#7fba66'; roundRect(ctx, 405, 313, 150, 43, 20); ctx.fill();
      ctx.fillStyle = '#fffbea'; ctx.font = '900 21px ui-rounded, sans-serif'; ctx.fillText('KEEP PLAYING', 480, 341); ctx.restore();
    }
  }
  function render() {
    ctx.save();
    if (screenShake > 0) ctx.translate(rand(-3, 3), rand(-3, 3));
    if (state === 'TITLE') drawTitle();
    else {
      drawArena(); drawDoor();
      coins.filter(c => c.active).forEach(drawCoin);
      drawLassos(); drawObstacles(); drawMouse(false); drawCat(); drawEffects(); drawHUD(); drawDpad(); drawJoystick(); drawOverlay();
    }
    ctx.restore();
  }

  // ---------- input ----------
  function togglePause() {
    if (state === 'PLAYING' || state === 'SNARED') paused = !paused;
  }
  window.addEventListener('keydown', e => {
    if (e.target === playerNameInput) return;
    initAudio();
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
    if (!e.repeat && state === 'SNARED' && e.code !== 'KeyP') mashEscape();
    if (!e.repeat && e.code === 'Space') triggerDash();
    if (!e.repeat && e.code === 'KeyP') togglePause();
    if (!e.repeat && state === 'TITLE' && (e.code === 'Enter' || e.code === 'Space')) startGame();
    keys[e.code] = true;
  }, { passive: false });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  window.addEventListener('blur', () => { keys = Object.create(null); if (state === 'PLAYING') paused = true; });

  leaderboardForm.addEventListener('submit', e => {
    e.preventDefault(); initAudio(); saveCurrentScore();
  });
  playAgainButton.addEventListener('click', () => { initAudio(); startGame(); });

  function dpadDirectionAt(p) {
    for (const [name, b] of Object.entries(DPAD)) {
      if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) return name;
    }
    return '';
  }
  function setDpadDirection(name) {
    pointer.dir = name;
    const b = DPAD[name];
    pointer.joyX = b ? b.dx : 0;
    pointer.joyY = b ? b.dy : 0;
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault(); initAudio(); canvas.setPointerCapture(e.pointerId);
    const p = pointFromEvent(e);
    if (p.x > 896 && p.y < 108) { muted = !muted; if (master) master.gain.value = muted ? 0 : .12; return; }
    if (state === 'TITLE') { if (p.x > 325 && p.x < 635 && p.y > 395 && p.y < 510) startGame(); return; }
    if (paused) { togglePause(); return; }
    if (p.x > 420 && p.x < 540 && p.y < 115) { togglePause(); return; }
    if (state === 'SNARED') mashEscape();
    pointer.id = e.pointerId; pointer.active = true; pointer.x = pointer.startX = p.x; pointer.y = pointer.startY = p.y;
    const dpadDir = dpadDirectionAt(p);
    pointer.side = dpadDir ? 'dpad' : (p.x < 480 ? 'left' : 'right');
    pointer.joyX = pointer.joyY = 0; pointer.lastAngle = null; pointer.dir = '';
    if (dpadDir) setDpadDirection(dpadDir);
    if (pointer.side === 'right') triggerDash();
  }, { passive: false });
  canvas.addEventListener('pointermove', e => {
    if (!pointer.active || e.pointerId !== pointer.id) return;
    e.preventDefault(); const p = pointFromEvent(e); pointer.x = p.x; pointer.y = p.y;
    if (pointer.side === 'dpad') {
      const nextDir = dpadDirectionAt(p);
      if (nextDir) setDpadDirection(nextDir);
    } else if (pointer.side === 'left') {
      const dx = p.x - pointer.startX, dy = p.y - pointer.startY, d = Math.hypot(dx, dy);
      const amount = Math.min(1, d / 42); pointer.joyX = d ? dx / d * amount : 0; pointer.joyY = d ? dy / d * amount : 0;
      const angle = Math.atan2(dy, dx);
      if (state === 'SNARED' && pointer.lastAngle !== null) {
        let da = Math.abs(angle - pointer.lastAngle); if (da > Math.PI) da = TAU - da;
        if (da > .75 && d > 22) { mashEscape(); pointer.lastAngle = angle; }
      } else if (d > 22) pointer.lastAngle = angle;
    }
  }, { passive: false });
  function endPointer(e) {
    if (e.pointerId !== pointer.id) return;
    pointer.active = false; pointer.id = null; pointer.joyX = pointer.joyY = 0; pointer.dir = '';
  }
  canvas.addEventListener('pointerup', endPointer, { passive: false });
  canvas.addEventListener('pointercancel', endPointer, { passive: false });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
  window.addEventListener('orientationchange', () => setTimeout(() => window.scrollTo(0, 0), 100));

  function frame(now) {
    const dt = Math.min(.033, Math.max(0, (now - lastTime) / 1000)); lastTime = now;
    update(dt); render(); requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  </script>
</body>
</html>
